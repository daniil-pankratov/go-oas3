openapi: 3.0.0
info:
  title: Generic Mode PoC
  version: 1.0.0
paths:
  /widgets:
    post:
      tags: [widgets]
      operationId: createWidget
      x-go-generics: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWidgetRequest'
      responses:
        '200':
          description: Widget created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /widgets/secure:
    get:
      tags: [widgets]
      operationId: getSecureWidget
      x-go-generics: true
      security:
        - Bearer: []
      responses:
        '200':
          description: Widget for authorized callers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /widgets/redirect:
    get:
      tags: [widgets]
      operationId: redirectToWidget
      x-go-generics: true
      responses:
        '302':
          description: Redirect to widget URL
          headers:
            Location:
              schema:
                type: string
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /widgets/echo:
    get:
      tags: [widgets]
      operationId: echoWidget
      x-go-generics: true
      responses:
        '200':
          description: Widget with custom headers and a cookie
          headers:
            X-Request-ID:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'

  /widgets/multi:
    get:
      tags: [widgets]
      operationId: getMultiWidget
      x-go-generics: true
      responses:
        '200':
          description: Widget in either JSON or XML
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
            application/xml:
              schema:
                $ref: '#/components/schemas/Widget'

  /classic-widgets:
    post:
      tags: [widgets]
      operationId: createClassicWidget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWidgetRequest'
      responses:
        '200':
          description: Widget created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
  schemas:
    CreateWidgetRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    Widget:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
